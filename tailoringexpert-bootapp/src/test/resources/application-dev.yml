spring:
  jpa:
    generate-ddl: 'false'
    database: h2
    properties:
      hibernate:
        use_sql_comments: 'true'
        format_sql: 'true'
        show_sql: 'true'
    show-sql: 'false'
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
  datasource:
    password: test1234
    driver-class-name: org.h2.Driver
    username: tailoring
    url: jdbc:h2:mem:tailoringexpert;DB_CLOSE_DELAY=-1
debug: 'true'
tailoringexpert:
  home:
    attachment: ${ATTACHMENT_HOME:target/attachments}
    tenant: ${TENANT_CONFIG_HOME:src/test/resources/tenants}
